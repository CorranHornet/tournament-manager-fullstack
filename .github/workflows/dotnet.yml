name: .NET Core Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore TournamentManager.sln

    - name: Build
      run: dotnet build TournamentManager.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test TournamentManager.sln --no-build --verbosity normal
